<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>代码生成器 | 项目脚手架接口</title>
    <!-- 引入 Font Awesome 6 免费图标库，提升视觉体验 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 使用现代、干净的字体 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f6 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1.5rem;
            color: #1e293b;
        }

        /* 模拟 Inter 字体，回退到系统字体 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #1f2b3c, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            background: none;
            color: #3b82f6;
            font-size: 2rem;
            background-clip: unset;
            -webkit-background-clip: unset;
        }

        .sub {
            color: #4b5563;
            margin-top: 0.6rem;
            font-size: 1rem;
            border-bottom: 1px solid #d1d9e8;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(0px);
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* 表单区域 */
        .form-panel {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #3b82f6;
            padding-left: 14px;
            color: #0f172a;
        }

        .section-title i {
            color: #3b82f6;
            font-size: 1.2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.8rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group label i {
            width: 18px;
            color: #5b6e8c;
            font-size: 0.8rem;
        }

        .input-group input, .input-group textarea {
            background-color: #ffffff;
            border: 1px solid #cfdfed;
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            transition: 0.2s;
            outline: none;
            color: #0a2540;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .input-group input::placeholder, .input-group textarea::placeholder {
            color: #9ca8bb;
            font-size: 0.85rem;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 70px;
            font-family: monospace;
        }

        .hint {
            font-size: 0.7rem;
            color: #7e8b9f;
            margin-top: 4px;
        }

        /* 根路径特别框 */
        .root-path {
            grid-column: span 2;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e4e9f0;
        }

        .btn {
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: #1e3a8a;
            color: white;
            box-shadow: 0 4px 8px rgba(30,58,138,0.2);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(37,99,235,0.25);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e6edf4;
        }

        /* 响应展示卡片 */
        .response-card {
            margin-top: 2rem;
            background: #f8fafc;
            border-radius: 24px;
            border: 1px solid #e2edf7;
            overflow: hidden;
            transition: all 0.2s;
        }

        .response-header {
            background: #eef3fc;
            padding: 0.9rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dae6f2;
            font-weight: 600;
        }

        .response-header span i {
            margin-right: 8px;
            color: #2c6e9e;
        }

        .copy-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            color: #3b82f6;
            font-weight: 500;
            transition: 0.1s;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .copy-btn:hover {
            background: #ffffffaa;
            color: #1e40af;
        }

        .response-content {
            padding: 1.5rem;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
            background: #0f172a;
            color: #e2e8f0;
            max-height: 380px;
            overflow: auto;
            border-radius: 0 0 20px 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .loading-overlay {
            display: inline-block;
            margin-left: 8px;
        }

        .error-text {
            color: #e11d48;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #6c7a91;
            font-size: 0.75rem;
        }

        @media (max-width: 740px) {
            body {
                padding: 1rem;
            }
            .form-panel {
                padding: 1.2rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .root-path {
                grid-column: span 1;
            }
            .action-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            <i class="fas fa-code-branch"></i>
            代码生成引擎
        </h1>
        <div class="sub">项目脚手架 · 智能接口适配器</div>
        <p style="margin-top: 12px; font-size: 0.85rem; color: #5a6e8a;">
            <i class="fas fa-plug"></i> 接口地址: <code id="apiEndpointDisplay" style="background:#eef2f6; padding:4px 10px; border-radius:50px;">${projectUrl}/generate/project</code>
        </p>
    </div>

    <div class="card">
        <div class="form-panel">
            <div class="section-title">
                <i class="fas fa-cubes"></i>
                项目配置信息
            </div>

            <form id="generatorForm">
                <!-- 动态网格布局 -->
                <div class="form-grid">
                    <div class="input-group">
                        <label><i class="fas fa-layer-group"></i> Group ID</label>
                        <input type="text" id="groupId" value="test.com" placeholder="例如: com.example" required>
                        <div class="hint">组织标识，通常为域名反转</div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-box"></i> Artifact ID</label>
                        <input type="text" id="artifactId" value="test" placeholder="项目唯一标识" required>
                        <div class="hint">项目构建的标识符</div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-tag"></i> 应用名称</label>
                        <input type="text" id="applicationName" value="test" placeholder="application name" required>
                        <div class="hint">服务/应用名称</div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-user-pen"></i> 作者</label>
                        <input type="text" id="author" value="test" placeholder="author name" required>
                        <div class="hint">代码作者署名</div>
                    </div>

<!--                    <div class="input-group">-->
<!--                        <label><i class="fas fa-folder-tree"></i> 子模块目录前缀</label>-->
<!--                        <input type="text" id="childModuleDirPrefix" value="test-cli" placeholder="例如: module-core">-->
<!--                        <div class="hint">childModuleDirPrefix 建议格式</div>-->
<!--                    </div>-->

<!--                    <div class="input-group">-->
<!--                        <label><i class="fas fa-code-branch"></i> 包名后缀</label>-->
<!--                        <input type="text" id="childLastPackage" value="cli" placeholder="例如: cli" disabled>-->
<!--                        <div class="hint">childLastPackage 包名后缀</div>-->
<!--                    </div>-->

                    <div class="input-group root-path">
                        <label><i class="fas fa-folder-open"></i> 根输出路径 (Root) <span style="color:#e11d48; font-size:12px;">* 绝对路径</span></label>
                        <textarea id="root" rows="1" placeholder="C:\\Users\\Desktop\\新建文件夹 或 /home/user/projects" required>C:\Users\Desktop\新建文件夹</textarea>
                        <div class="hint">示例: Windows格式 C:\\path\\to\\folder 或 Unix /home/path</div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置默认</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> 生成项目</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 接口调用响应区域 -->
    <div class="response-card" id="responseCard" style="display: none;">
        <div class="response-header">
            <span><i class="fas fa-terminal"></i> 服务器响应</span>
            <button class="copy-btn" id="copyResponseBtn"><i class="far fa-copy"></i> 复制响应</button>
        </div>
        <div class="response-content" id="responseContent">
            {/* 动态内容 */}
        </div>
    </div>

    <footer>
        <i class="fas fa-shield-alt"></i> 请求方法 POST · Content-Type application/json · 支持CORS（请确保接口已配置跨域）
    </footer>
</div>

<script>
    // 动态获取或者替换接口地址占位符：原占位符为 ${projectUrl}/generate/project
    // 由于实际页面无法从模板引擎渲染，这里允许手动设置/或者从本地提取，默认提供可编辑? 为了方便测试，我们让用户自主配置一个地址输入框?
    // 为了符合题目要求: 接口地址固定为字符串： ￥${projectUrl}/generate/project 但实际占位符往往表示动态。 我们设计一个更灵活:
    // 按照大多数真实场景，需要让开发/测试人员可以修改API地址。 但交互上在标题旁边增加一个可配置的全局变量, 保证接口调用对准真实后端.
    // 但题中描述接口地址： ￥${projectUrl}/generate/project  这里的 projectUrl 可由用户环境配置。最好添加一个配置区域便于联调。
    // 为了体验优雅，在页面右上角增加一个小的设置齿条区域，另外默认猜测可能的后端地址。 由于没有提供真实 projectUrl, 提供一个默认值用于演示
    // 默认value从当前window.location推断: 如果当前是file://则提示需要填写真实后端地址。 为了更好演示，我添加内联地址修改功能。

    // 获取存储api地址的元素，并准备默认/用户可覆盖。
    let currentApiUrl = "";

    // 辅助初始化真实接口地址: 优先从sessionStorage取，否则从占位符推理
    function initApiUrl() {
        const stored = sessionStorage.getItem("generator_api_url");
        if (stored && stored.trim() !== "") {
            return stored.trim();
        }
        // 占位符解析: 原字符串 "${projectUrl}/generate/project" 替换规则，如果未替换保留占位符，提示用户配置.
        // 为了开箱即用，设置一个合理推测后端地址: 尝试从当前页面域名下的 /generate/project 但很难保证。演示最友好：提供一个默认后端模拟地址。
        // 由于用户实际有真实后端，我们给一个提醒配置模式。但又必须保证可用性，我们增加一个可配置条。
        // 让用户拥有输入API地址的灵活方式，展示在接口地址旁边一个编辑图标。
        const defaultPlaceholder = "${projectUrl}";
        // 若当前域名不是本地生产，可使用默认提醒（相对路径无法猜测）。我们构建一个全局变量设定适当的占位默认值: 推荐用户设置后端 Origin。
        // 为避免请求失败，提供测试占位符，用户必须修改为自己的后端地址。
        return "http://localhost:8080/generate/project";  // 默认开发常用，但实际可更改
    }

    // 显示当前API地址可编辑的UI组件
    function enhanceApiHeader() {
        const apiSpan = document.getElementById("apiEndpointDisplay");
        if (!apiSpan) return;
        const parentDiv = apiSpan.parentNode;
        // 创建可编辑内联区域
        const editIcon = document.createElement("i");
        editIcon.className = "fas fa-pencil-alt";
        editIcon.style.cursor = "pointer";
        editIcon.style.marginLeft = "8px";
        editIcon.style.fontSize = "0.75rem";
        editIcon.style.background = "#e2e8f0";
        editIcon.style.padding = "4px 8px";
        editIcon.style.borderRadius = "30px";
        editIcon.title = "点击修改后端接口地址";

        const apiText = document.createElement("code");
        apiText.style.background = "#eef2f6";
        apiText.style.padding = "4px 12px";
        apiText.style.borderRadius = "50px";
        apiText.style.fontSize = "0.8rem";
        apiText.innerText = currentApiUrl;

        // 替换区域
        apiSpan.innerHTML = "";
        apiSpan.appendChild(apiText);
        apiSpan.appendChild(editIcon);

        editIcon.addEventListener("click", () => {
            let newUrl = prompt("请输入完整的接口 URL (POST JSON):", currentApiUrl);
            if (newUrl && newUrl.trim() !== "") {
                currentApiUrl = newUrl.trim();
                apiText.innerText = currentApiUrl;
                sessionStorage.setItem("generator_api_url", currentApiUrl);
                // 显示修改成功小提示（简要）
                showToast("接口地址已更新", 1500);
            }
        });
    }

    // 简易 toast 提示
    function showToast(msg, duration = 2000) {
        let toast = document.querySelector(".custom-toast");
        if (!toast) {
            const div = document.createElement("div");
            div.className = "custom-toast";
            div.style.position = "fixed";
            div.style.bottom = "20px";
            div.style.left = "50%";
            div.style.transform = "translateX(-50%)";
            div.style.backgroundColor = "#1f2937";
            div.style.color = "white";
            div.style.padding = "8px 18px";
            div.style.borderRadius = "40px";
            div.style.fontSize = "0.85rem";
            div.style.zIndex = "999";
            div.style.fontWeight = "500";
            div.style.boxShadow = "0 10px 20px rgba(0,0,0,0.2)";
            div.style.backdropFilter = "blur(4px)";
            document.body.appendChild(div);
            toast = div;
        }
        toast.innerText = msg;
        toast.style.opacity = "1";
        setTimeout(() => {
            toast.style.opacity = "0";
        }, duration);
    }

    // 获取表单统一对象 (projectInfo)
    function getProjectInfoFromForm() {
        const groupId = document.getElementById("groupId").value.trim();
        const artifactId = document.getElementById("artifactId").value.trim();
        const applicationName = document.getElementById("applicationName").value.trim();
        const author = document.getElementById("author").value.trim();
        const childModuleDirPrefix = artifactId;
        const childLastPackage = artifactId;
        let root = document.getElementById("root").value.trim();

        // 简单校验必填项
        if (!groupId || !artifactId || !applicationName || !author || !root) {
            throw new Error("请填写完整的必填字段 (Group ID, Artifact ID, 应用名称, 作者, 根路径)");
        }

        // 针对 Windows 路径反斜杠处理（直接发送即可）
        return {
            groupId,
            artifactId,
            applicationName,
            author,
            childModuleDirPrefix: childModuleDirPrefix || "",    // 如果为空则传空字符串
            childLastPackage: childLastPackage || "",
            root: root
        };
    }

    // 渲染响应区域
    function showResponse(status, data, isError = false) {
        const responseCard = document.getElementById("responseCard");
        const responseContentDiv = document.getElementById("responseContent");
        if (!responseCard || !responseContentDiv) return;

        responseCard.style.display = "block";
        let statusHtml = "";
        let contentText = "";

        if (isError) {
            statusHtml = `<span class="status-badge" style="background:#ffe4e6; color:#be123c;"><i class="fas fa-exclamation-triangle"></i> 请求失败</span>`;
            contentText = typeof data === "string" ? data : JSON.stringify(data, null, 2);
        } else {
            statusHtml = `<span class="status-badge" style="background:#e0f2fe; color:#0c4e6e;"><i class="fas fa-check-circle"></i> 状态码: ${status}</span>`;
            contentText = typeof data === "string" ? data : JSON.stringify(data, null, 2);
        }

        // 在头部追加展示状态（保留原头部复制按钮，同时新增状态显示）
        const headerDiv = responseCard.querySelector(".response-header");
        let existingStatus = headerDiv.querySelector(".status-badge");
        if (!existingStatus) {
            const statusSpan = document.createElement("div");
            statusSpan.className = "status-badge";
            statusSpan.innerHTML = statusHtml;
            headerDiv.insertBefore(statusSpan, headerDiv.children[1]);
        } else {
            existingStatus.innerHTML = statusHtml;
        }

        responseContentDiv.innerText = contentText;
        // 滚动到响应区域
        responseCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    // 清空状态中的status旧标记更新
    function clearStatusBadge() {
        const headerDiv = document.getElementById("responseCard");
        if (headerDiv) {
            const badge = headerDiv.querySelector(".status-badge");
            if (badge) badge.remove();
        }
    }

    // 调用接口核心
    async function callGenerateApi(projectPayload) {
        const submitBtn = document.getElementById("submitBtn");
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 生成中...';
        submitBtn.disabled = true;

        try {
            // 确保当前api地址有效
            if (!currentApiUrl || currentApiUrl === "${projectUrl}/generate/project" || currentApiUrl.includes("${projectUrl}")) {
                showToast("⚠️ 请先设置有效的接口地址（点击地址栏旁边✏️图标）", 2500);
                throw new Error("接口地址无效，请配置正确的后端URL");
            }

            const requestBody = {
                projectInfo: projectPayload
            };

            const response = await fetch(currentApiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify(requestBody)
            });

            let responseData;
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                responseData = await response.json();
            } else {
                responseData = await response.text();
            }

            if (!response.ok) {
                // 显示错误
                showResponse(response.status, responseData, true);
                showToast(`接口调用失败: ${response.status}`, 3000);
                return;
            }

            showResponse(response.status, responseData, false);
            showToast("✨ 项目生成请求已发送，后端处理成功！", 2000);
        } catch (error) {
            console.error("请求异常:", error);
            let errMsg = error.message || "网络错误或跨域问题，请检查后端服务是否运行且支持CORS";
            showResponse(0, { error: errMsg, detail: error.toString() }, true);
            showToast(`请求异常: ${errMsg}`, 4000);
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    // 重置表单到默认值（示例默认）
    function resetToDefault() {
        document.getElementById("groupId").value = "test.com";
        document.getElementById("artifactId").value = "test";
        document.getElementById("applicationName").value = "test";
        document.getElementById("author").value = "test";
        document.getElementById("childModuleDirPrefix").value = "test-cli";
        document.getElementById("childLastPackage").value = "cli";
        document.getElementById("root").value = "C:\\Users\\Desktop\\新建文件夹";
        showToast("已重置为默认配置");
    }

    // 复制响应文本到剪贴板
    function setupCopyResponse() {
        const copyBtn = document.getElementById("copyResponseBtn");
        if (!copyBtn) return;
        copyBtn.addEventListener("click", () => {
            const contentDiv = document.getElementById("responseContent");
            if (!contentDiv || !contentDiv.innerText) {
                showToast("没有可复制的响应内容", 1000);
                return;
            }
            const text = contentDiv.innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast("✅ 响应内容已复制到剪贴板", 1500);
            }).catch(() => {
                showToast("无法复制，请手动选择", 1000);
            });
        });
    }

    // 表单提交主逻辑
    function bindFormSubmit() {
        const form = document.getElementById("generatorForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearStatusBadge();  // 移除旧状态标签避免重复
            try {
                const projectInfo = getProjectInfoFromForm();
                await callGenerateApi(projectInfo);
            } catch (err) {
                showToast(`表单验证错误: ${err.message}`, 3000);
                // 在响应区域显示错误
                showResponse(400, { validationError: err.message }, true);
            }
        });
    }

    // 监听重置按钮
    function bindReset() {
        const resetBtn = document.getElementById("resetBtn");
        if (resetBtn) {
            resetBtn.addEventListener("click", resetToDefault);
        }
    }

    // 页面加载时初始化
    (function init() {
        // 获取api初始地址
        currentApiUrl = initApiUrl();
        // 更新显示和可编辑能力
        enhanceApiHeader();
        bindFormSubmit();
        bindReset();
        setupCopyResponse();
        // 可选增加样式提示对于默认路径通知（若地址为localhost提示用户修改）
        if (currentApiUrl.includes("localhost") || currentApiUrl.includes("127.0.0.1")) {
            console.log("当前接口地址为本地开发地址，请确保后端服务运行中");
        } else if (currentApiUrl.includes("${projectUrl}")) {
            showToast("⚠️ 接口地址为占位符，请点击地址旁的编辑按钮配置正确后端", 4000);
        }
    })();
</script>
</body>
</html>
